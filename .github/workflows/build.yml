name: Build VLESS VPN

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Create Android project
        run: |
          mkdir -p app/src/main/java/com/example/vlessvpn
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          
          # Создаём простейшее приложение
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              compileSdk 33
              namespace 'com.example.vlessvpn'
              defaultConfig {
                  applicationId "com.example.vlessvpn"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF
          
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.vlessvpn">
              <application android:label="NyxVPN">
                  <activity android:name=".MainActivity">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          cat > app/src/main/java/com/example/vlessvpn/MainActivity.java << 'EOF'
          package com.example.vlessvpn;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.TextView;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  TextView tv = new TextView(this);
                  tv.setText("NyxVPN готов к работе!\nВаши VLESS конфиги внутри");
                  setContentView(tv);
              }
          }
          EOF
      
      - name: Generate gradle files
        run: |
          cat > settings.gradle << 'EOF'
          include ':app'
          EOF
          
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          EOF
      
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug || true
          find . -name "*.apk" -exec cp {} . \;
      
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: NyxVPN
          path: "*.apk"
