name: Build Signed VLESS VPN

on:
  workflow_dispatch:  # Ручной запуск
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/example/vlessvpn
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/keystore
      
      - name: Create gradle files
        run: |
          # settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "VLESS VPN"
          include ':app'
          EOF
          
          # build.gradle (root)
          cat > build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.8.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          EOF
          
          # app/build.gradle
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'kotlin-android'
          }

          android {
              compileSdk 33
              namespace 'com.example.vlessvpn'
              
              defaultConfig {
                  applicationId "com.example.vlessvpn"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
              
              signingConfigs {
                  release {
                      storeFile file("keystore/release.keystore.jks")
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }
              
              buildTypes {
                  debug {
                      minifyEnabled false
                  }
                  release {
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                      signingConfig signingConfigs.release
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_11
                  targetCompatibility JavaVersion.VERSION_11
              }
              
              kotlinOptions {
                  jvmTarget = '11'
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.9.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.8.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF
      
      - name: Create AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="VLESS VPN"
                  android:theme="@style/Theme.VLESSVPN">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
      
      - name: Create layout
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="16dp">
              
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="VLESS VPN"
                  android:textSize="24sp"
                  android:textStyle="bold"
                  android:layout_marginBottom="20dp"/>
              
              <EditText
                  android:id="@+id/vlessInput"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:hint="Введите VLESS ссылку"
                  android:inputType="textMultiLine"
                  android:padding="12dp"
                  android:background="@android:drawable/editbox_background"/>
              
              <Button
                  android:id="@+id/connectButton"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Подключиться"
                  android:layout_marginTop="16dp"/>
              
              <TextView
                  android:id="@+id/statusText"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Статус: Отключено"
                  android:layout_marginTop="16dp"
                  android:textSize="16sp"/>
          </LinearLayout>
          EOF
      
      - name: Create strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">Мой VLESS VPN</string>
          </resources>
          EOF
      
      - name: Create MainActivity.kt
        run: |
          cat > app/src/main/java/com/example/vlessvpn/MainActivity.kt << 'EOF'
          package com.example.vlessvpn
          
          import android.os.Bundle
          import android.widget.Button
          import android.widget.EditText
          import android.widget.TextView
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          
          class MainActivity : AppCompatActivity() {
              
              private lateinit var vlessInput: EditText
              private lateinit var connectButton: Button
              private lateinit var statusText: TextView
              private var isConnected = false
              
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  
                  vlessInput = findViewById(R.id.vlessInput)
                  connectButton = findViewById(R.id.connectButton)
                  statusText = findViewById(R.id.statusText)
                  
                  connectButton.setOnClickListener {
                      val vlessLink = vlessInput.text.toString().trim()
                      if (vlessLink.isEmpty()) {
                          Toast.makeText(this, "Введите VLESS ссылку", Toast.LENGTH_SHORT).show()
                          return@setOnClickListener
                      }
                      
                      if (!vlessLink.startsWith("vless://")) {
                          Toast.makeText(this, "Неверный формат", Toast.LENGTH_SHORT).show()
                          return@setOnClickListener
                      }
                      
                      isConnected = !isConnected
                      if (isConnected) {
                          connectButton.text = "Отключиться"
                          statusText.text = "Статус: Подключено"
                          Toast.makeText(this, "Подключено к VPN", Toast.LENGTH_SHORT).show()
                      } else {
                          connectButton.text = "Подключиться"
                          statusText.text = "Статус: Отключено"
                          Toast.makeText(this, "Отключено", Toast.LENGTH_SHORT).show()
                      }
                  }
              }
          }
          EOF
      
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore/release.keystore.jks
      
      - name: Build and Sign APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: vless-vpn-signed
          path: app/build/outputs/apk/release/*.apk
